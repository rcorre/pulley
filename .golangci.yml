version: "2"

linters:
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - testifylint
    - unconvert
    - unparam
  settings:
    gosec:
      excludes:
        - G304 # file path from variable — expected for config/editor temp files
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - unparam
