version: "2"

linters:
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - testifylint
    - unconvert
    - unparam

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning
  gosec:
    excludes:
      - G304 # file path from variable — expected for config/editor temp files

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - unparam
